server:
  port: 8083

spring:
  application:
    name: loan-service
  jackson:
    default-property-inclusion: non_null

  datasource:
    url: jdbc:h2:mem:loandb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# Must be identical to the secret configured in user-service so that JWTs
# issued at login can be validated here without a network call.
jwt:
  secret: ${JWT_SECRET:abcBank$ecretKeyForJWTSigning_MustBeAtLeast256BitsLong_ChangeInProd}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

logging:
  level:
    com.sangam.abcbank: INFO
