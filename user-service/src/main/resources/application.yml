server:
  port: 8081

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: password

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# NOTE: In production, move this secret to a Kubernetes Secret / Vault and
# inject it as an environment variable. It MUST be identical in user-service
# and banking-service since banking-service validates tokens issued here.
jwt:
  secret: ${JWT_SECRET:abcBank$ecretKeyForJWTSigning_MustBeAtLeast256BitsLong_ChangeInProd}
  expiration-ms: ${JWT_EXPIRATION_MS:3600000}

logging:
  level:
    com.sangam.abcbank: INFO

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
    tagsSorter: alpha