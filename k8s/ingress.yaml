apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: abc-bank-ingress
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: abc-bank.example.com   # replace with your real domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: abc-bank-service
                port:
                  number: 80
  tls:
    - hosts:
        - abc-bank.example.com
      secretName: abc-bank-tls
