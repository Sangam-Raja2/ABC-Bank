# IMPORTANT: replace the base64 value below before deploying to any real
# environment. To generate: echo -n 'your-long-random-secret' | base64
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: abcbank
type: Opaque
