# DO NOT commit a filled-in version of this file to git.
# Create the real secret out-of-band, e.g.:
#   kubectl create secret generic abc-bank-secret \
#     --from-literal=JWT_SECRET=your-real-secret \
#     --from-literal=DB_PASSWORD=your-real-password
#
# Or use sealed-secrets / SOPS / your cloud provider's secret manager
# and reference it the same way via secretRef in deployment.yaml.

apiVersion: v1
kind: Secret
metadata:
  name: abc-bank-secret
type: Opaque
stringData:
  JWT_SECRET: "replace-me"
  DB_PASSWORD: "replace-me"
