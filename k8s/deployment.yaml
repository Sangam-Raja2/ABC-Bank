apiVersion: apps/v1
kind: Deployment
metadata:
  name: abc-bank
  labels:
    app: abc-bank
spec:
  replicas: 2
  selector:
    matchLabels:
      app: abc-bank
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: abc-bank
    spec:
      containers:
        - name: abc-bank
          image: ghcr.io/sangam-raja2/abc-bank:latest   # overwritten by CI with the commit SHA tag
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: abc-bank-config
            - secretRef:
                name: abc-bank-secret
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
